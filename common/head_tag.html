<script type="text/javascript">
  document.addEventListener("DOMContentLoaded", function() {
    function cleanTextNode(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        let text = node.textContent || "";
        if (text.includes("총") || text.includes("개")) {
          node.textContent = text.replace(/총\s?/g, "").replace(/개/g, "").trim();
        }
      } else if (node.nodeType === Node.ELEMENT_NODE) {
        if (node.tagName !== "SCRIPT" && node.tagName !== "STYLE") {
          for (let child of node.childNodes) {
            cleanTextNode(child);
          }
        }
      }
    }

    function cleanCategoryStats() {
      const statsElements = document.querySelectorAll(
        ".category-stat, .category-stats, td.topics, td.posts, .category-list-item .posts, .category-list-item .topics"
      );
      statsElements.forEach(el => {
        cleanTextNode(el);
      });
    }

    const observer = new MutationObserver(function(mutations) {
      cleanCategoryStats();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });

    cleanCategoryStats();
  });
</script>
